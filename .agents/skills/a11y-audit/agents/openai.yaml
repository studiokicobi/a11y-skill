# Codex Agent Skills metadata for a11y-audit.
# See https://developers.openai.com/codex/skills for spec.

interface:
  display_name: "Accessibility Audit (WCAG 2.2 AA)"
  short_description: "Audit a codebase or live URL for WCAG 2.2 AA issues; produces a triaged report grouped by fix autonomy."
  brand_color: "#005FCC"
  default_prompt: "Run an accessibility audit on this project and produce the triaged report."

policy:
  # Implicit invocation is enabled — the skill should trigger whenever the
  # user mentions accessibility, a11y, WCAG, screen readers, keyboard nav,
  # color contrast, or ARIA. This matches the trigger surface described in
  # SKILL.md's description.
  allow_implicit_invocation: true

dependencies:
  # Static scanner, tokens scanner, and triage are Python stdlib only.
  # Runtime (a11y_runtime.js) and stateful (a11y_stateful.js) scanners need
  # Node.js, Playwright (downloads Chromium on first install), axe-core, and
  # yaml (for --config .yaml journey files). The scripts auto-install these
  # into a local .a11y-audit-deps/ directory on first use, so no manual setup
  # is required, but the host needs Node and npm available.
  runtimes:
    - type: python
      min_version: "3.8"
      reason: "Static scanner (a11y_scan.py), tokens scanner (tokens.py), triage (triage.py), contrast checker (contrast_checker.py). Uses standard library only."

    - type: node
      min_version: "18"
      optional: true
      reason: "Runtime scanner (a11y_runtime.js) and stateful runner (a11y_stateful.js). Only needed when auditing live URLs or multi-step journeys; static scans work without Node."

  packages:
    - type: npm
      name: playwright
      optional: true
      auto_install: true
      reason: "Headless Chromium driver for the runtime and stateful scans. Auto-installed on first run into .a11y-audit-deps/ along with the Chromium binary."

    - type: npm
      name: axe-core
      optional: true
      auto_install: true
      reason: "WCAG rule engine injected into the page by the runtime and stateful scanners. Auto-installed alongside Playwright."

    - type: npm
      name: yaml
      optional: true
      auto_install: true
      reason: "Parser for YAML journey configs passed via --config. Auto-installed on first run of a11y_runtime.js or a11y_stateful.js when a .yaml/.yml config is supplied."
