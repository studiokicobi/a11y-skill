<!DOCTYPE html>
<html lang="en">
  <head><meta charset="utf-8"><title>Clickable div regression</title></head>
  <body>
    <!-- SHOULD flag (needs decision — role+tabindex case): the combo makes
         the element focusable but does NOT guarantee Enter/Space activation.
         The static scanner can't verify a keyboard handler exists, so we
         surface this for the user to confirm. -->
    <div role="button" tabindex="0" onclick="doThing()">Submit</div>

    <!-- SHOULD flag (needs decision — role+tabindex case): same reasoning. -->
    <span role="link" tabindex="0" onclick="nav()">Open profile</span>

    <!-- SHOULD flag: role="button" but no tabindex (not focusable). -->
    <div role="button" onclick="stillBroken()">Missing tabindex</div>

    <!-- SHOULD flag: tabindex but no interactive role (focusable but not
         announced as a button to assistive tech). -->
    <div tabindex="0" onclick="alsoBroken()">Missing role</div>

    <!-- SHOULD flag: plain div with onClick, no tabindex, no role. -->
    <div onclick="plainDiv()">Plain div</div>
  </body>
</html>
