name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Build a11y-audit.skill archive
        run: |
          bash scripts/pack.sh dist/a11y-audit.skill

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: dist/a11y-audit.skill
          fail_on_unmatched_files: true
          generate_release_notes: true
